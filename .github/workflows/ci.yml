name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Ready-review regression tests
        run: node --experimental-strip-types --test test/ready-review-corrections.test.ts

      - name: Full test suite
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm run pack:dry
