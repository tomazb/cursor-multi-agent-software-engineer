name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the command, run state, config with secrets removed, and smallest reproducible sequence.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Cursor CLI/SDK version, runtime kind, and model slugs.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant run data
      description: State, event history, failure text, and sanitized artifact excerpts. Never include credentials or proprietary code without authorization.
  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      options:
        - Unknown
        - Yes
        - No
    validations:
      required: true
